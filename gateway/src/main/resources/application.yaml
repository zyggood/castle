spring:  application:    name: gateway  cloud:    gateway:      server:        webflux:          globalcors:            add-to-simple-url-handler-mapping: true  # 处理OPTIONS预检请求            cors-configurations:              '[/**]':                allowed-origins:                  - "https://*.example.com"                  - "http://localhost:*"                allowed-methods:                  - GET                  - POST                  - PUT                  - DELETE                  - OPTIONS                allowed-headers:                  - Content-Type                  - Authorization                  - X-Requested-With                allow-credentials: true                max-age: 3600                exposedHeaders: # 前端可访问的响应头                  - Authorization          routes:            - id: admin              uri: lb://admin              predicates:                - Path=/admin/**              filters:                - StripPrefix=1  # ?? /api ??                - AddRequestHeader=X-Request-Foo, Bar    #                - name: RequestRateLimiter  # ??    #                  args:    #                    redis-rate-limiter.replenishRate: 10    #                    redis-rate-limiter.burstCapacity: 20            - id: auth              uri: lb://auth              predicates:                - Path=/auth/**              filters:                - StripPrefix=1  # ?? /api ??                - AddRequestHeader=X-Request-Foo, Bar    nacos:      discovery:        server-addr: 127.0.0.1:8848        username: nacos        password: mz3fNNbXK1hK        namespace: public      serverAddr: 127.0.0.1:8848      config:        import-check:          enabled: true      username: nacos      password: mz3fNNbXK1hK  config:    import:      - nacos:nacos-config-example.properties?refreshEnabled=trueserver:  port: 10001logging:  level:    org.springframework.cloud.gateway: DEBUG    com.alibaba.nacos: DEBUG    org.springframework.cloud.loadbalancer: DEBUG